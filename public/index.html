<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>First Person Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #chat, #status { position: absolute; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.8);
padding: 10px; border-radius: 5px; }
        #chat { display: none; }
        .joystick-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
        .touch-area {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="health" style="position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.8);
padding: 10px; border-radius: 5px;"></div>
    <div id="chat">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
        <ul id="messages"></ul>
    </div>
    <div id="status"></div>
    <div class="joystick-container"></div>
    <div class="touch-area"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
