<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ninja Shooter 3D | Mikhailov D.K.</title>
    <style>
        /* 1. ТЕМНЫЙ ФОН И КИБЕРПАНК СТИЛЬ */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Consolas', monospace; }
        canvas { display: block; }

        /* 2. НЕОНОВЫЙ ПРИЦЕЛ В ЦЕНТРЕ */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 12px; height: 12px;
            border: 2px solid #00ff88;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        /* 3. ОБНОВЛЕННЫЙ UI (Здоровье, чат, статус) */
        #health, #chat, #status {
            position: absolute;
            background: rgba(0, 0, 0, 0.7); /* Темный прозрачный фон */
            color: #00ff88; /* Твой зеленый цвет */
            border: 1px solid #00ff88;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        #health { top: 20px; left: 20px; font-size: 18px; font-weight: bold; }
        #status { top: 20px; right: 20px; }
        #chat { bottom: 20px; left: 20px; display: none; width: 300px; }

        /* 4. МОБИЛЬНЫЕ ДЖОЙСТИКИ (Прозрачные) */
        .joystick-container, .touch-area {
            position: absolute;
            width: 100px; height: 100px;
            background-color: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 50%;
            bottom: 30px;
        }
        .joystick-container { left: 30px; }
        .touch-area { right: 30px; }

        input, button { background: #000; color: #00ff88; border: 1px solid #00ff88; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- ПРИЦЕЛ -->
    <div id="crosshair"></div>

    <!-- UI -->
    <div id="health">HP: 100</div>
    
    <div id="chat">
        <input type="text" id="messageInput" placeholder="Пиши ниндзям...">
        <button onclick="sendMessage()">ОТПРАВИТЬ</button>
        <ul id="messages" style="list-style: none; padding: 0; max-height: 100px; overflow-y: auto;"></ul>
    </div>

    <div id="status">Подключение к серверу...</div>

    <!-- МОБИЛЬНОЕ УПРАВЛЕНИЕ -->
    <div class="joystick-container"></div>
    <div class="touch-area"></div>

    <!-- СКРИПТЫ (ПРАВИЛЬНЫЙ ПОРЯДОК) -->
    <script src="socket.io.js"></script>
    <script src="three.min.js"></script>
    <!-- ВАЖНО: Добавляем загрузчик моделей, чтобы не было ошибок -->
    <script src="GLTFLoader.js"></script> 
    <script src="game.js"></script>
</body>
</html>
